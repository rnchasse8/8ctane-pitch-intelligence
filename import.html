<title>8ctane — Bulk Outing Import</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
.import-page { max-width: 680px; margin: 3rem auto; padding: 0 1.5rem; }
.import-title { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800; margin-bottom:.25rem; }
.import-sub { font-size:13px; color:var(--muted); margin-bottom:2rem; line-height:1.6; }
.outing-import-row {
  background: var(--surface); border:1px solid var(--border); border-radius:7px;
  padding:.875rem 1.25rem; margin-bottom:.5rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
}
.outing-import-row.done   { border-left:3px solid var(--good); }
.outing-import-row.error  { border-left:3px solid var(--danger); }
.outing-import-row.active { border-left:3px solid var(--cyan); }
.outing-import-left { display:flex; align-items:center; gap:12px; }
.outing-import-date { font-family:'DM Mono',monospace; font-size:12px; color:var(--cyan); min-width:90px; }
.outing-import-opp  { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; }
.outing-import-meta { font-size:11px; color:var(--muted); }
.outing-import-status { font-family:'DM Mono',monospace; font-size:11px; }
.status-pending { color:var(--muted2); }
.status-saving  { color:var(--cyan); }
.status-done    { color:var(--good); }
.status-error   { color:var(--danger); }
.progress-bar-wrap { background:var(--border); border-radius:3px; height:6px; margin:1.5rem 0; overflow:hidden; }
.progress-bar-fill { height:6px; background:var(--cyan); border-radius:3px; transition:width .3s; }
.import-actions { display:flex; gap:.75rem; margin-bottom:1.5rem; align-items:center; }
.athlete-select { background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:13px; padding:8px 12px; border-radius:5px; outline:none; flex:1; }
.athlete-select:focus { border-color:var(--cyan); }
.result-summary { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.25rem; margin-top:1rem; display:none; }
.result-summary.show { display:block; }
</style>
</head>

  <div class="import-actions">
    <select class="athlete-select" id="athlete-select">
      <option value="">Loading athletes...</option>
    </select>
    <button class="btn-primary" id="btn-import" onclick="startImport()" disabled style="opacity:.4">Import All Outings</button>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>

  <div id="outing-rows"></div>

    <div style="margin-top:1rem;display:flex;gap:.75rem">

let SCRIPT_URL = localStorage.getItem('8ctane_script_url') || '';
let athletes = [];
let importRunning = false;

async function api(action, body={}) {
  const res = await fetch(`${SCRIPT_URL}?action=${action}`, {
    method:'POST', body: JSON.stringify({action,...body})
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function init() {
  if (!SCRIPT_URL) {
    SCRIPT_URL = prompt('Paste your Apps Script URL:');
    if (SCRIPT_URL) localStorage.setItem('8ctane_script_url', SCRIPT_URL);
  }
  try {
    const { athletes: aths } = await api('getAthletes');
    athletes = aths;
    const sel = document.getElementById('athlete-select');
    sel.innerHTML = '<option value="">Select athlete...</option>' +
      aths.map(a => `<option value="${a.id}">${a.name} — ${a.team||''} ${a.level||''}</option>`).join('');
    // Auto-select Thomas if present
    const thomas = aths.find(a => a.name.toLowerCase().includes('harrington'));
    if (thomas) { sel.value = thomas.id; checkReady(); }
  } catch(e) {
    document.getElementById('athlete-select').innerHTML = `<option>Error loading: ${e.message}</option>`;
  }
  renderRows();
}

function checkReady() {
  const ready = document.getElementById('athlete-select').value;
  const btn = document.getElementById('btn-import');
  btn.disabled = !ready;
  btn.style.opacity = ready ? '1' : '.4';
}

function renderRows() {
  document.getElementById('outing-count').textContent = `${OUTINGS.length} outings`;
  document.getElementById('outing-rows').innerHTML = OUTINGS.map((o,i) => {
    const pitches = Object.keys(o.pitchMap).filter(pt=>o.pitchMap[pt].count>0);
    const whiffRate = o.total_pitches ? (o.whiffs/o.total_pitches*100).toFixed(1) : '—';
    return `<div class="outing-import-row" id="row-${i}">
      <div class="outing-import-left">
        <div class="outing-import-date">${o.date}</div>
        <div>
          <div class="outing-import-opp">vs. ${o.opponent}</div>
          <div class="outing-import-meta">${o.total_pitches} pitches · ${whiffRate}% whiff · ${o.ks}K ${o.walks}BB · ${pitches.join(', ')}</div>
        </div>
      </div>
      <div class="outing-import-status status-pending" id="status-${i}">Pending</div>
    </div>`;
  }).join('');
}

async function startImport() {
  if (importRunning) return;
  const athleteId = document.getElementById('athlete-select').value;
  if (!athleteId) return;

  importRunning = true;
  document.getElementById('btn-import').disabled = true;
  document.getElementById('btn-import').textContent = 'Importing...';
  document.getElementById('progress-wrap').style.display = '';

  let done = 0, errors = 0;

  for (let i = 0; i < OUTINGS.length; i++) {
    const o = OUTINGS[i];
    const row = document.getElementById(`row-${i}`);
    const status = document.getElementById(`status-${i}`);

    row.className = 'outing-import-row active';
    status.className = 'outing-import-status status-saving';
    status.textContent = 'Saving...';

    try {
      // Filter out empty pitch types
      const cleanMap = {};
      Object.entries(o.pitchMap).forEach(([pt,s]) => { if (s.count > 0) cleanMap[pt] = s; });

      await api('addOuting', {
        athleteId,
        date: o.date,
        opponent: o.opponent,
        notes: '',
        pitchMap: cleanMap,
        stats: {
          total: o.total_pitches,
          whiffs: o.whiffs,
          calledStrikes: o.calledStrikes,
          walks: o.walks,
          ks: o.ks,
          avgEV: o.avgEV,
          hardHitPct: o.hardHitPct,
        }
      });

      row.className = 'outing-import-row done';
      status.className = 'outing-import-status status-done';
      status.textContent = '✓ Saved';
      done++;
    } catch(e) {
      row.className = 'outing-import-row error';
      status.className = 'outing-import-status status-error';
      status.textContent = '✗ Error';
      errors++;
    }

    const pct = Math.round((i+1)/OUTINGS.length*100);
    document.getElementById('progress-bar').style.width = pct+'%';

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 600));
  }

  const summary = document.getElementById('result-summary');
  document.getElementById('result-title').textContent = errors === 0
    ? `✓ All ${done} outings imported successfully`
    : `${done} outings imported, ${errors} failed`;
  document.getElementById('result-body').textContent =
    `Thomas Harrington's 2026 season is now in the Athletes system. Head to his profile to see season overview, trends, and year-over-year comparisons.`;
  summary.classList.add('show');
  importRunning = false;
}

document.getElementById('athlete-select').addEventListener('change', checkReady);
init();
</script>
