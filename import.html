<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8ctane — Bulk Outing Import</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
.import-page { max-width: 680px; margin: 3rem auto; padding: 0 1.5rem; }
.import-title { font-family:'Barlow Condensed',sans-serif; font-size:28px; font-weight:800; margin-bottom:.25rem; }
.import-sub { font-size:13px; color:var(--muted); margin-bottom:2rem; line-height:1.6; }
.outing-import-row {
  background: var(--surface); border:1px solid var(--border); border-radius:7px;
  padding:.875rem 1.25rem; margin-bottom:.5rem;
  display:flex; align-items:center; justify-content:space-between; gap:1rem;
}
.outing-import-row.done   { border-left:3px solid var(--good); }
.outing-import-row.error  { border-left:3px solid var(--danger); }
.outing-import-row.active { border-left:3px solid var(--cyan); }
.outing-import-left { display:flex; align-items:center; gap:12px; }
.outing-import-date { font-family:'DM Mono',monospace; font-size:12px; color:var(--cyan); min-width:90px; }
.outing-import-opp  { font-family:'Barlow Condensed',sans-serif; font-size:16px; font-weight:700; }
.outing-import-meta { font-size:11px; color:var(--muted); }
.outing-import-status { font-family:'DM Mono',monospace; font-size:11px; }
.status-pending { color:var(--muted2); }
.status-saving  { color:var(--cyan); }
.status-done    { color:var(--good); }
.status-error   { color:var(--danger); }
.progress-bar-wrap { background:var(--border); border-radius:3px; height:6px; margin:1.5rem 0; overflow:hidden; }
.progress-bar-fill { height:6px; background:var(--cyan); border-radius:3px; transition:width .3s; }
.import-actions { display:flex; gap:.75rem; margin-bottom:1.5rem; align-items:center; }
.athlete-select { background:var(--surface2); border:1px solid var(--border2); color:var(--text); font-family:'Barlow',sans-serif; font-size:13px; padding:8px 12px; border-radius:5px; outline:none; flex:1; }
.athlete-select:focus { border-color:var(--cyan); }
.result-summary { background:var(--surface); border:1px solid var(--border); border-radius:8px; padding:1.25rem; margin-top:1rem; display:none; }
.result-summary.show { display:block; }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="header-left">
      <a href="index.html"><img src="logo.png" alt="8ctane Baseball" class="nav-logo"></a>
      <span class="nav-divider"></span>
      <span class="nav-product">Bulk Import</span>
    </div>
    <div class="header-right">
      <a href="athletes.html" class="btn-ghost">← Athletes</a>
    </div>
  </div>
</header>

<div class="import-page">
  <div class="import-title">Bulk Outing Import</div>
  <p class="import-sub">
    Importing <strong id="outing-count">5 outings</strong> for <strong>Ryan Chasse</strong>
    — 2026 season (2026-04-23 – 2026-05-07).
  </p>

  <div class="import-actions">
    <select class="athlete-select" id="athlete-select">
      <option value="">Loading athletes...</option>
    </select>
    <button class="btn-primary" id="btn-import" onclick="startImport()" disabled style="opacity:.4">Import All Outings</button>
  </div>

  <div class="progress-bar-wrap" id="progress-wrap" style="display:none">
    <div class="progress-bar-fill" id="progress-bar" style="width:0%"></div>
  </div>

  <div id="outing-rows"></div>

  <div class="result-summary" id="result-summary">
    <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;margin-bottom:.5rem" id="result-title"></div>
    <div style="font-size:13px;color:var(--muted)" id="result-body"></div>
    <div style="margin-top:1rem;display:flex;gap:.75rem">
      <a href="athletes.html" class="btn-primary">View in Athletes →</a>
    </div>
  </div>
</div>

<script>
const OUTINGS = [{"date":"2026-04-23","opponent":"GAS","total_pitches":12,"whiffs":2,"calledStrikes":1,"walks":0,"ks":1,"avgEV":75.3,"hardHitPct":0.0,"pitchMap":{"FS":{"count":1,"whiffs":0,"cstrikes":0,"hip":0,"avgVelo":82.4,"peakVelo":82.4,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":null,"avgIVB":7.7,"avgHB":-9.2,"avgVAA":-7.0,"avgHAA":1.7},"FF":{"count":8,"whiffs":0,"cstrikes":1,"hip":1,"avgVelo":93.0,"peakVelo":93.7,"whiffPct":0.0,"cswPct":12.5,"avgXwoba":null,"avgEV":79.8,"avgIVB":18.0,"avgHB":-8.2,"avgVAA":-5.6,"avgHAA":1.5},"SL":{"count":2,"whiffs":2,"cstrikes":0,"hip":0,"avgVelo":84.1,"peakVelo":85.1,"whiffPct":100.0,"cswPct":100.0,"avgXwoba":null,"avgEV":null,"avgIVB":-0.1,"avgHB":-1.2,"avgVAA":-10.0,"avgHAA":3.1},"CU":{"count":1,"whiffs":0,"cstrikes":0,"hip":1,"avgVelo":80.2,"peakVelo":80.2,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":70.9,"avgIVB":-3.5,"avgHB":2.2,"avgVAA":-7.9,"avgHAA":2.2}}},{"date":"2026-04-25","opponent":"GAS","total_pitches":27,"whiffs":2,"calledStrikes":5,"walks":1,"ks":2,"avgEV":76.3,"hardHitPct":50.0,"pitchMap":{"CU":{"count":1,"whiffs":0,"cstrikes":0,"hip":0,"avgVelo":77.8,"peakVelo":77.8,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":null,"avgIVB":-7.5,"avgHB":-1.0,"avgVAA":-12.3,"avgHAA":2.4},"FF":{"count":12,"whiffs":0,"cstrikes":3,"hip":1,"avgVelo":91.4,"peakVelo":92.3,"whiffPct":0.0,"cswPct":25.0,"avgXwoba":null,"avgEV":96.3,"avgIVB":19.2,"avgHB":-7.8,"avgVAA":-5.5,"avgHAA":1.7},"SL":{"count":12,"whiffs":2,"cstrikes":2,"hip":1,"avgVelo":81.8,"peakVelo":86.1,"whiffPct":16.7,"cswPct":33.3,"avgXwoba":null,"avgEV":56.3,"avgIVB":-3.6,"avgHB":2.1,"avgVAA":-9.5,"avgHAA":3.5},"CH":{"count":2,"whiffs":0,"cstrikes":0,"hip":0,"avgVelo":82.9,"peakVelo":84.0,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":null,"avgIVB":11.4,"avgHB":-16.1,"avgVAA":-10.2,"avgHAA":2.3}}},{"date":"2026-05-12","opponent":"LAN","total_pitches":25,"whiffs":3,"calledStrikes":3,"walks":0,"ks":0,"avgEV":85.2,"hardHitPct":20.0,"pitchMap":{"SL":{"count":6,"whiffs":0,"cstrikes":1,"hip":3,"avgVelo":84.5,"peakVelo":85.9,"whiffPct":0.0,"cswPct":16.7,"avgXwoba":null,"avgEV":92.0,"avgIVB":5.3,"avgHB":1.3,"avgVAA":-7.4,"avgHAA":2.7},"CU":{"count":5,"whiffs":1,"cstrikes":0,"hip":0,"avgVelo":80.1,"peakVelo":81.3,"whiffPct":20.0,"cswPct":20.0,"avgXwoba":null,"avgEV":null,"avgIVB":-7.2,"avgHB":3.9,"avgVAA":-10.9,"avgHAA":3.3},"FF":{"count":11,"whiffs":1,"cstrikes":2,"hip":2,"avgVelo":92.3,"peakVelo":93.0,"whiffPct":9.1,"cswPct":27.3,"avgXwoba":null,"avgEV":75.0,"avgIVB":21.3,"avgHB":-7.8,"avgVAA":-5.1,"avgHAA":1.2},"FS":{"count":3,"whiffs":1,"cstrikes":0,"hip":1,"avgVelo":82.9,"peakVelo":83.6,"whiffPct":33.3,"cswPct":33.3,"avgXwoba":null,"avgEV":null,"avgIVB":11.5,"avgHB":-14.5,"avgVAA":-7.0,"avgHAA":0.9}}},{"date":"2026-05-15","opponent":"LAN","total_pitches":14,"whiffs":4,"calledStrikes":2,"walks":0,"ks":1,"avgEV":52.8,"hardHitPct":0.0,"pitchMap":{"FF":{"count":7,"whiffs":2,"cstrikes":2,"hip":1,"avgVelo":91.8,"peakVelo":93.4,"whiffPct":28.6,"cswPct":57.1,"avgXwoba":null,"avgEV":80.7,"avgIVB":20.4,"avgHB":-7.5,"avgVAA":-6.0,"avgHAA":1.6},"CU":{"count":2,"whiffs":0,"cstrikes":0,"hip":1,"avgVelo":78.0,"peakVelo":78.5,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":24.9,"avgIVB":-6.3,"avgHB":5.3,"avgVAA":-9.8,"avgHAA":3.0},"SL":{"count":5,"whiffs":2,"cstrikes":0,"hip":0,"avgVelo":84.6,"peakVelo":86.1,"whiffPct":40.0,"cswPct":40.0,"avgXwoba":null,"avgEV":null,"avgIVB":9.5,"avgHB":-1.7,"avgVAA":-7.8,"avgHAA":2.4}}},{"date":"2026-05-07","opponent":"YOR","total_pitches":8,"whiffs":2,"calledStrikes":2,"walks":0,"ks":1,"avgEV":88.1,"hardHitPct":50.0,"pitchMap":{"FF":{"count":3,"whiffs":0,"cstrikes":2,"hip":0,"avgVelo":90.0,"peakVelo":90.4,"whiffPct":0.0,"cswPct":66.7,"avgXwoba":null,"avgEV":null,"avgIVB":19.2,"avgHB":-10.9,"avgVAA":-5.8,"avgHAA":1.3},"SL":{"count":4,"whiffs":2,"cstrikes":0,"hip":2,"avgVelo":83.4,"peakVelo":85.1,"whiffPct":50.0,"cswPct":50.0,"avgXwoba":null,"avgEV":88.1,"avgIVB":7.7,"avgHB":-0.3,"avgVAA":-7.8,"avgHAA":3.5},"FS":{"count":1,"whiffs":0,"cstrikes":0,"hip":0,"avgVelo":81.5,"peakVelo":81.5,"whiffPct":0.0,"cswPct":0.0,"avgXwoba":null,"avgEV":null,"avgIVB":14.3,"avgHB":-14.9,"avgVAA":-7.7,"avgHAA":0.9}}}];

let SCRIPT_URL = localStorage.getItem('8ctane_script_url') || '';
let athletes = [];
let importRunning = false;

async function api(action, body={}) {
  const res = await fetch(`${SCRIPT_URL}?action=${action}`, {
    method:'POST', body: JSON.stringify({action,...body})
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

async function init() {
  if (!SCRIPT_URL) {
    SCRIPT_URL = prompt('Paste your Apps Script URL:');
    if (SCRIPT_URL) localStorage.setItem('8ctane_script_url', SCRIPT_URL);
  }
  try {
    const { athletes: aths } = await api('getAthletes');
    athletes = aths;
    const sel = document.getElementById('athlete-select');
    sel.innerHTML = '<option value="">Select athlete...</option>' +
      aths.map(a => `<option value="${a.id}">${a.name} — ${a.team||''} ${a.level||''}</option>`).join('');
    // Auto-select Thomas if present
    const thomas = aths.find(a => a.name.toLowerCase().includes('chasse'));
    if (thomas) { sel.value = thomas.id; checkReady(); }
  } catch(e) {
    document.getElementById('athlete-select').innerHTML = `<option>Error loading: ${e.message}</option>`;
  }
  renderRows();
}

function checkReady() {
  const ready = document.getElementById('athlete-select').value;
  const btn = document.getElementById('btn-import');
  btn.disabled = !ready;
  btn.style.opacity = ready ? '1' : '.4';
}

function renderRows() {
  document.getElementById('outing-count').textContent = `${OUTINGS.length} outings`;
  document.getElementById('outing-rows').innerHTML = OUTINGS.map((o,i) => {
    const pitches = Object.keys(o.pitchMap).filter(pt=>o.pitchMap[pt].count>0);
    const whiffRate = o.total_pitches ? (o.whiffs/o.total_pitches*100).toFixed(1) : '—';
    return `<div class="outing-import-row" id="row-${i}">
      <div class="outing-import-left">
        <div class="outing-import-date">${o.date}</div>
        <div>
          <div class="outing-import-opp">vs. ${o.opponent}</div>
          <div class="outing-import-meta">${o.total_pitches} pitches · ${whiffRate}% whiff · ${o.ks}K ${o.walks}BB · ${pitches.join(', ')}</div>
        </div>
      </div>
      <div class="outing-import-status status-pending" id="status-${i}">Pending</div>
    </div>`;
  }).join('');
}

async function startImport() {
  if (importRunning) return;
  const athleteId = document.getElementById('athlete-select').value;
  if (!athleteId) return;

  importRunning = true;
  document.getElementById('btn-import').disabled = true;
  document.getElementById('btn-import').textContent = 'Importing...';
  document.getElementById('progress-wrap').style.display = '';

  let done = 0, errors = 0;

  for (let i = 0; i < OUTINGS.length; i++) {
    const o = OUTINGS[i];
    const row = document.getElementById(`row-${i}`);
    const status = document.getElementById(`status-${i}`);

    row.className = 'outing-import-row active';
    status.className = 'outing-import-status status-saving';
    status.textContent = 'Saving...';

    try {
      // Filter out empty pitch types
      const cleanMap = {};
      Object.entries(o.pitchMap).forEach(([pt,s]) => { if (s.count > 0) cleanMap[pt] = s; });

      await api('addOuting', {
        athleteId,
        date: o.date,
        opponent: o.opponent,
        notes: '',
        pitchMap: cleanMap,
        stats: {
          total: o.total_pitches,
          whiffs: o.whiffs,
          calledStrikes: o.calledStrikes,
          walks: o.walks,
          ks: o.ks,
          avgEV: o.avgEV,
          hardHitPct: o.hardHitPct,
        }
      });

      row.className = 'outing-import-row done';
      status.className = 'outing-import-status status-done';
      status.textContent = '✓ Saved';
      done++;
    } catch(e) {
      row.className = 'outing-import-row error';
      status.className = 'outing-import-status status-error';
      status.textContent = '✗ Error';
      errors++;
    }

    const pct = Math.round((i+1)/OUTINGS.length*100);
    document.getElementById('progress-bar').style.width = pct+'%';

    // Small delay to avoid rate limiting
    await new Promise(r => setTimeout(r, 600));
  }

  const summary = document.getElementById('result-summary');
  document.getElementById('result-title').textContent = errors === 0
    ? `✓ All ${done} outings imported successfully`
    : `${done} outings imported, ${errors} failed`;
  document.getElementById('result-body').textContent =
    `Ryan Chasse's 2026 season is now in the Athletes system. Head to his profile to see season overview, trends, and year-over-year comparisons.`;
  summary.classList.add('show');
  importRunning = false;
}

document.getElementById('athlete-select').addEventListener('change', checkReady);
init();
</script>

<footer class="site-footer">
  <img src="logo.png" alt="8ctane Baseball" style="height:28px;opacity:.5">
  <span>Bulk Import · 8ctane Pitch Intelligence</span>
</footer>

</body>
</html>
