<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8ctane Baseball — Pitcher Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0b0e;
    --surface: #13151a;
    --surface2: #1a1d24;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.12);
    --text: #e8eaf0;
    --muted: #72747c;
    --muted2: #4a4c54;
    --cyan: #00d4ff;
    --good: #1D9E75;
    --warn: #BA7517;
    --danger: #E24B4A;
    --pink: #e91e8c;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ---- HEADER ---- */
  .player-header {
    background: linear-gradient(135deg, #0d1117 0%, #13151a 100%);
    border-bottom: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex;
    align-items: center;
    gap: 1rem;
    position: sticky;
    top: 0;
    z-index: 100;
    backdrop-filter: blur(12px);
  }
  .player-header img { height: 32px; opacity: .9; }
  .header-divider {
    width: 1px; height: 24px;
    background: var(--border2);
    margin: 0 .25rem;
  }
  .header-tag {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .12em;
  }

  /* ---- HERO ---- */
  .player-hero {
    background: linear-gradient(135deg, #0f1318 0%, #141820 60%, #0a0f14 100%);
    border-bottom: 1px solid var(--border);
    padding: 2.5rem 2rem;
    position: relative;
    overflow: hidden;
  }
  .player-hero::before {
    content: '';
    position: absolute;
    top: -80px; right: -80px;
    width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(0,212,255,0.04) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-inner {
    max-width: 900px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    gap: 1.75rem;
  }
  .player-avatar {
    width: 72px; height: 72px;
    border-radius: 50%;
    background: linear-gradient(135deg, #1a2030, #0f1520);
    border: 2px solid var(--border2);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px; font-weight: 800;
    color: var(--cyan);
    flex-shrink: 0;
  }
  .hero-info { flex: 1; }
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 38px; font-weight: 900;
    letter-spacing: .01em;
    line-height: 1;
    margin-bottom: .4rem;
  }
  .player-meta {
    display: flex;
    gap: .75rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .meta-badge {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 2px 8px;
    letter-spacing: .06em;
  }
  .meta-badge.team { color: var(--cyan); border-color: rgba(0,212,255,0.2); background: rgba(0,212,255,0.05); }
  .hero-stats {
    display: flex;
    gap: 2rem;
    flex-shrink: 0;
  }
  .hero-stat { text-align: center; }
  .hero-stat-val {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 28px; font-weight: 800;
    line-height: 1;
  }
  .hero-stat-lbl {
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: .1em;
    margin-top: 3px;
  }

  /* ---- TABS ---- */
  .player-tabs {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    gap: 0;
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 65px;
    z-index: 90;
  }
  .player-tabs::-webkit-scrollbar { display: none; }
  .ptab {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .1em;
    color: var(--muted);
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    padding: .875rem 1.25rem;
    cursor: pointer;
    white-space: nowrap;
    transition: color .15s, border-color .15s;
  }
  .ptab:hover { color: var(--text); }
  .ptab.active { color: var(--cyan); border-bottom-color: var(--cyan); }

  /* ---- CONTENT ---- */
  .player-content { max-width: 900px; margin: 0 auto; padding: 2rem; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ---- SECTION HEADERS ---- */
  .section-hd {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px; font-weight: 700;
    text-transform: uppercase;
    letter-spacing: .14em;
    color: var(--cyan);
    margin-bottom: .75rem;
    padding-bottom: .5rem;
    border-bottom: 1px solid var(--border);
  }

  /* ---- INSIGHT ---- */
  .insight-headline {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 32px; font-weight: 800;
    margin-bottom: .625rem;
    line-height: 1.1;
  }
  .insight-summary {
    font-size: 14px; color: var(--muted);
    line-height: 1.75; max-width: 680px;
    margin-bottom: 1.5rem;
  }
  .insight-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: .75rem;
    margin-bottom: 1.5rem;
  }
  .insight-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: .875rem 1.125rem;
  }
  .insight-card.good  { border-left: 3px solid var(--good); }
  .insight-card.danger{ border-left: 3px solid var(--danger); }
  .insight-title { font-weight: 600; font-size: 13px; margin-bottom: 4px; }
  .insight-body  { font-size: 12px; color: var(--muted); line-height: 1.65; }

  .arsenal-recs { display: flex; flex-direction: column; gap: .5rem; margin-bottom: 1.5rem; }
  .arsenal-rec {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 6px; padding: .75rem 1rem;
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }
  .arsenal-rec.keep    { border-left: 3px solid var(--good); }
  .arsenal-rec.develop { border-left: 3px solid var(--cyan); }
  .arsenal-rec.add     { border-left: 3px solid var(--pink); }
  .arsenal-rec.remove  { border-left: 3px solid var(--warn); }
  .arsenal-rec strong  { color: var(--text); }

  .splits-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem;
  }
  .splits-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.25rem;
  }
  .splits-hd {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .06em;
    margin-bottom: .5rem;
  }
  .splits-body { font-size: 12px; color: var(--muted); line-height: 1.65; }

  .dev-priorities {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden;
  }
  .dev-row {
    display: flex; align-items: flex-start; gap: 1rem;
    padding: .75rem 1.25rem; border-bottom: 1px solid var(--border);
    font-size: 13px; color: var(--muted); line-height: 1.6;
  }
  .dev-row:last-child { border-bottom: none; }
  .dev-num {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--cyan); min-width: 16px; padding-top: 2px; flex-shrink: 0;
  }

  /* ---- REPORT / PERCENTILE ---- */
  .report-header {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px 10px 0 0;
    padding: 1.25rem 1.5rem; text-align: center;
    margin-bottom: 0;
  }
  .report-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 24px; font-weight: 800; margin-bottom: 2px;
  }
  .report-meta { font-size: 12px; color: var(--muted); margin-bottom: .875rem; }
  .report-sum-strip { display: flex; justify-content: center; gap: 1.5rem; flex-wrap: wrap; }
  .report-sum-stat { text-align: center; }
  .report-sum-val { font-family: 'DM Mono', monospace; font-size: 20px; font-weight: 500; }
  .report-sum-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; }
  .report-body {
    background: var(--surface); border: 1px solid var(--border); border-top: none;
    border-radius: 0 0 10px 10px; padding-bottom: 1rem;
  }
  .pct-section-hd {
    font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 700;
    text-transform: uppercase; letter-spacing: .14em; color: var(--cyan);
    padding: .75rem 1.5rem .25rem; border-top: 1px solid var(--border); margin-top: .25rem;
  }
  .pct-group-hd {
    font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: .1em;
    color: var(--muted2); padding: .5rem 1.5rem .125rem;
    font-family: 'Barlow Condensed', sans-serif;
  }
  .pct-axis { display:flex; justify-content:space-between; padding:0 1.5rem 0 9.5rem; font-size:10px; color:var(--muted2); font-family:'DM Mono',monospace; margin-bottom:4px; }
  .pct-row { display:flex; align-items:center; padding:.3rem 1.5rem; gap:.75rem; }
  .pct-row:hover { background:var(--surface2); }
  .pct-label { min-width:100px; flex-shrink:0; font-size:12px; }
  .pct-bar-track { flex:1; height:20px; background:var(--surface2); border-radius:3px; overflow:visible; position:relative; border:1px solid var(--border); }
  .pct-bar-fill { height:100%; border-radius:3px; position:relative; transition:width .5s ease; display:flex; align-items:center; justify-content:flex-end; min-width:4px; }
  .pct-bubble { position:absolute; right:-10px; width:20px; height:20px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-family:'DM Mono',monospace; font-size:9px; font-weight:500; color:#fff; z-index:2; }
  .pct-value { min-width:56px; text-align:right; font-family:'DM Mono',monospace; font-size:12px; }

  /* ---- PITCH METRICS ---- */
  .metrics-table {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem;
  }
  .metrics-row {
    display: flex; align-items: center;
    padding: .75rem 1.25rem;
    border-bottom: 1px solid var(--border);
    gap: 1rem;
  }
  .metrics-row:last-child { border-bottom: none; }
  .metrics-row.header { background: var(--surface2); }
  .metrics-pitch { min-width: 100px; display: flex; align-items: center; gap: 8px; }
  .metrics-pitch-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
  .metrics-pitch-name { font-family:'Barlow Condensed',sans-serif; font-size:14px; font-weight:700; }
  .metrics-col { flex:1; text-align:center; font-family:'DM Mono',monospace; font-size:12px; }
  .metrics-col.hd { font-size:10px; color:var(--muted); text-transform:uppercase; letter-spacing:.08em; }
  .v-good { color: var(--good); }
  .v-warn { color: var(--warn); }
  .v-bad  { color: var(--danger); }
  .v-num  { color: var(--text); }

  /* ---- OUTING SELECT ---- */
  .sel-input {
    background: var(--surface2); border: 1px solid var(--border2);
    color: var(--text); font-family: 'Barlow', sans-serif; font-size: 13px;
    padding: 10px 14px; border-radius: 6px; outline: none;
    width: 100%; max-width: 420px; margin-bottom: 1.5rem;
  }
  .sel-input:focus { border-color: var(--cyan); }

  /* ---- LOADING / EMPTY ---- */
  .ai-loading { text-align:center; padding:3rem 1rem; color:var(--muted); font-size:13px; }
  .loading-spinner {
    width: 28px; height: 28px; border: 2px solid var(--border2);
    border-top-color: var(--cyan); border-radius: 50%;
    animation: spin .7s linear infinite; margin: 0 auto 1rem;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty-state { text-align:center; padding:3rem; color:var(--muted); font-size:13px; }

  /* ---- FOOTER ---- */
  .player-footer {
    border-top: 1px solid var(--border);
    padding: 1.25rem 2rem;
    display: flex; align-items: center; gap: 1rem;
    margin-top: 3rem;
  }
  .player-footer img { height: 24px; opacity: .4; }
  .player-footer span { font-size: 11px; color: var(--muted2); font-family:'DM Mono',monospace; }

  @media (max-width: 640px) {
    .player-hero { padding: 1.5rem 1rem; }
    .hero-inner { flex-direction: column; align-items: flex-start; gap: 1rem; }
    .hero-stats { gap: 1.25rem; }
    .player-content { padding: 1.25rem 1rem; }
    .insight-grid, .splits-grid { grid-template-columns: 1fr; }
    .player-tabs { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header class="player-header">
  <img src="logo.png" alt="8ctane Baseball">
  <div class="header-divider"></div>
  <span class="header-tag">Pitcher Dashboard</span>
</header>

<div id="loading" style="text-align:center;padding:4rem;color:#72747c;font-family:'DM Mono',monospace;font-size:13px">
  <div class="loading-spinner" style="margin:0 auto 1rem"></div>
  Loading your dashboard...
</div>

<div id="app" style="display:none">

  <div class="player-hero">
    <div class="hero-inner">
      <div class="player-avatar" id="hero-avatar"></div>
      <div class="hero-info">
        <div class="player-name" id="hero-name"></div>
        <div class="player-meta" id="hero-meta"></div>
      </div>
      <div class="hero-stats" id="hero-stats"></div>
    </div>
  </div>

  <nav class="player-tabs">
    <button class="ptab active" data-tab="overview">Overview</button>
    <button class="ptab" data-tab="report">Report</button>
    <button class="ptab" data-tab="season-insight">Season Insight</button>
    <button class="ptab" data-tab="outing-insight">Outing Insight</button>
    <button class="ptab" data-tab="pitch-metrics">Pitch Metrics</button>
  </nav>

  <div class="player-content">

    <!-- OVERVIEW -->
    <div class="tab-panel active" id="tab-overview">
      <div class="section-hd" style="margin-bottom:1rem">Season overview</div>
      <div id="overview-content"></div>
    </div>

    <!-- REPORT -->
    <div class="tab-panel" id="tab-report">
      <div id="report-content"></div>
    </div>

    <!-- SEASON INSIGHT -->
    <div class="tab-panel" id="tab-season-insight">
      <div id="season-insight-content">
        <div class="ai-loading">
          <div class="loading-spinner"></div>
          Generating your season analysis...
        </div>
      </div>
    </div>

    <!-- OUTING INSIGHT -->
    <div class="tab-panel" id="tab-outing-insight">
      <div class="section-hd" style="margin-bottom:.75rem">Select outing</div>
      <select id="outing-sel" class="sel-input" onchange="loadOutingInsight()">
        <option value="">Select an outing...</option>
      </select>
      <div id="outing-insight-content"></div>
    </div>

    <!-- PITCH METRICS -->
    <div class="tab-panel" id="tab-pitch-metrics">
      <div id="pitch-metrics-content"></div>
    </div>

  </div>
</div>

<footer class="player-footer">
  <img src="logo.png" alt="8ctane Baseball">
  <span>8ctane Baseball · Pitch Intelligence</span>
</footer>

<script src="baselines-ref.js"></script>
<script>
// =============================================
// CONFIG — reads from localStorage (set by athletes page)
// =============================================
const SCRIPT_URL = localStorage.getItem('8ctane_script_url') || '';

const PITCH_COLORS = {
  FF:'#378ADD',FA:'#378ADD',SI:'#888780',FC:'#534AB7',
  SL:'#E24B4A',ST:'#D85A30',CU:'#1D9E75',KC:'#1D9E75',
  FS:'#BA7517',CH:'#BA7517',OTHER:'#555566'
};
const PITCH_NAMES = {
  FF:'4-Seam',FA:'4-Seam',SI:'Sinker',FC:'Cutter',
  SL:'Slider',ST:'Sweeper',CU:'Curveball',KC:'K-Curve',
  FS:'Splitter',CH:'Changeup',OTHER:'Other'
};
const pc = pt => PITCH_COLORS[pt] || '#555566';
const pn = pt => PITCH_NAMES[pt] || pt;
const pf = v => { const n = parseFloat(v); return isNaN(n) ? 0 : n; };
function avg(arr) { return arr.length ? arr.reduce((a,b)=>a+b,0)/arr.length : 0; }

function formatDate(d) {
  if (!d) return '—';
  const clean = d.toString().split('T')[0].trim();
  const dt = new Date(clean + 'T12:00:00');
  if (isNaN(dt)) return clean;
  return dt.toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric' });
}

async function api(action, body={}) {
  const res = await fetch(`${SCRIPT_URL}?action=${action}`, {
    method:'POST', body: JSON.stringify({action,...body})
  });
  const data = await res.json();
  if (data.error) throw new Error(data.error);
  return data;
}

// =============================================
// INIT
// =============================================
let athlete = null;
let outings = [];

async function init() {
  const params = new URLSearchParams(window.location.search);
  const athleteId = params.get('id');

  if (!athleteId || !SCRIPT_URL) {
    document.getElementById('loading').innerHTML = `
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:.5rem">Dashboard unavailable</div>
      <div style="color:#72747c;font-size:13px">Please use the link provided by your coach.</div>`;
    return;
  }

  try {
    const { athletes } = await api('getAthletes');
    athlete = athletes.find(a => a.id === athleteId);
    if (!athlete) throw new Error('Athlete not found');

    const result = await api('getOutings', { athleteId });
    outings = result.outings || [];

    renderHero();
    renderOverview();
    renderReport();
    renderPitchMetrics();
    populateOutingSelect();

    document.getElementById('loading').style.display = 'none';
    document.getElementById('app').style.display = '';

    // Auto-generate season insight
    renderSeasonInsight();

  } catch(e) {
    document.getElementById('loading').innerHTML = `<div style="color:#E24B4A;font-size:13px">Error: ${e.message}</div>`;
  }
}

// =============================================
// HERO
// =============================================
function renderHero() {
  const initials = athlete.name.split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  document.getElementById('hero-avatar').textContent = initials;
  document.getElementById('hero-name').textContent = athlete.name;

  const meta = [];
  if (athlete.throws) meta.push(`<span class="meta-badge">${athlete.throws}HP</span>`);
  if (athlete.position) meta.push(`<span class="meta-badge">${athlete.position}</span>`);
  if (athlete.team) meta.push(`<span class="meta-badge team">${athlete.team}</span>`);
  if (athlete.level) meta.push(`<span class="meta-badge">${athlete.level}</span>`);
  document.getElementById('hero-meta').innerHTML = meta.join('');

  const totalPitches = outings.reduce((a,o)=>a+(+o.total_pitches||0),0);
  const totalK  = outings.reduce((a,o)=>a+(+o.strikeouts||0),0);
  const totalBB = outings.reduce((a,o)=>a+(+o.walks||0),0);
  const totalW  = outings.reduce((a,o)=>a+(+o.whiffs||0),0);
  const whiffPct = totalPitches ? (totalW/totalPitches*100).toFixed(1) : '—';

  document.getElementById('hero-stats').innerHTML = [
    { v: outings.length,   l: 'Outings' },
    { v: totalPitches,     l: 'Pitches' },
    { v: whiffPct + '%',   l: 'Whiff%' },
    { v: totalK,           l: 'K' },
    { v: totalBB,          l: 'BB' },
  ].map(s => `<div class="hero-stat">
    <div class="hero-stat-val">${s.v}</div>
    <div class="hero-stat-lbl">${s.l}</div>
  </div>`).join('');

  document.title = `${athlete.name} — 8ctane Dashboard`;
}

// =============================================
// OVERVIEW — arsenal table + recent outings
// =============================================
function renderOverview() {
  const combined = {};
  outings.forEach(o => {
    let pm = {};
    try { pm = typeof o.pitch_stats==='object' ? o.pitch_stats : JSON.parse(o.pitch_stats_json||'{}'); } catch(e){}
    Object.entries(pm).forEach(([pt,s]) => {
      if (!s.count) return;
      if (!combined[pt]) combined[pt] = { count:0, whiffs:0, cstrikes:0, hip:0, xwobas:[], evs:[], velos:[] };
      const c = combined[pt];
      c.count += s.count||0; c.whiffs += s.whiffs||0; c.cstrikes += s.cstrikes||0; c.hip += s.hip||0;
      if (s.avgVelo)  c.velos.push(pf(s.avgVelo));
      if (s.avgXwoba) c.xwobas.push(pf(s.avgXwoba));
      if (s.avgEV)    c.evs.push(pf(s.avgEV));
    });
  });

  const total = Object.values(combined).reduce((a,s)=>a+s.count, 0);
  const sorted = Object.entries(combined).sort((a,b)=>b[1].count-a[1].count);
  const mlb = MLB_BASELINE_REF;

  const rows = sorted.map(([pt,s]) => {
    const usage = total ? (s.count/total*100).toFixed(1) : 0;
    const whiff = s.count ? (s.whiffs/s.count*100).toFixed(1) : '—';
    const csw   = s.count ? ((s.whiffs+s.cstrikes)/s.count*100).toFixed(1) : '—';
    const xwoba = s.xwobas.length ? avg(s.xwobas).toFixed(3) : '—';
    const velo  = s.velos.length ? avg(s.velos).toFixed(1) : '—';
    const mw = mlb[pt]?.whiff_pct;
    const wCls = parseFloat(whiff) >= 30 ? 'v-good' : parseFloat(whiff) >= 15 ? '' : 'v-bad';
    return `<tr style="border-bottom:1px solid var(--border)">
      <td style="padding:.625rem 1rem">

// REPORT — percentile bars
// =============================================
function renderReport() {
  const combined = {};
  outings.forEach(o => {
    let pm = {};
    try { pm = typeof o.pitch_stats==='object' ? o.pitch_stats : JSON.parse(o.pitch_stats_json||'{}'); } catch(e){}
    Object.entries(pm).forEach(([pt,s]) => {
      if (!s.count) return;
      if (!combined[pt]) combined[pt] = { count:0, whiffs:0, cstrikes:0, hip:0, xwobas:[], evs:[], hardHits:0, velos:[] };
      const c = combined[pt];
      c.count += s.count||0; c.whiffs += s.whiffs||0; c.cstrikes += s.cstrikes||0; c.hip += s.hip||0;
      if (s.avgVelo)  c.velos.push(pf(s.avgVelo));
      if (s.avgXwoba) c.xwobas.push(pf(s.avgXwoba));
      if (s.avgEV)    c.evs.push(pf(s.avgEV));
    });
  });

  const totalP = Object.values(combined).reduce((a,s)=>a+s.count, 0);
  const totalW = Object.values(combined).reduce((a,s)=>a+s.whiffs, 0);
  const totalCS = Object.values(combined).reduce((a,s)=>a+s.cstrikes, 0);
  const totalK  = outings.reduce((a,o)=>a+(+o.strikeouts||0),0);
  const totalBB = outings.reduce((a,o)=>a+(+o.walks||0),0);
  const totalHIP = Object.values(combined).reduce((a,s)=>a+s.hip,0);
  const allXwobas = Object.values(combined).flatMap(s=>s.xwobas);
  const allEVs    = Object.values(combined).flatMap(s=>s.evs);
  const ff = combined['FF'] || combined['FA'];

  const whiffPct = totalP ? totalW/totalP*100 : 0;
  const cswPct   = totalP ? (totalW+totalCS)/totalP*100 : 0;
  const kPct     = totalHIP+totalK+totalBB > 0 ? totalK/(totalHIP+totalK+totalBB)*100 : 0;
  const bbPct    = totalHIP+totalK+totalBB > 0 ? totalBB/(totalHIP+totalK+totalBB)*100 : 0;
  const avgXwoba = allXwobas.length ? avg(allXwobas) : null;
  const avgEV    = allEVs.length ? avg(allEVs) : null;
  const avgVelo  = ff?.velos.length ? avg(ff.velos) : null;
  const ffPeaks  = outings.map(o => { try { const pm = typeof o.pitch_stats==='object'?o.pitch_stats:JSON.parse(o.pitch_stats_json||'{}'); return pf((pm['FF']||pm['FA'])?.peakVelo); } catch(e){return 0;} }).filter(Boolean);
  const peakVelo = ffPeaks.length ? Math.max(...ffPeaks) : null;

  const level = (athlete.level||'').toLowerCase();
  const isIndy = level==='other'||level==='atlantic'||level==='indy';

  const DIST = {
    whiffPct:   {p10:12,p25:17,p50:22,p75:27,p90:33,hib:true},
    cswPct:     {p10:14,p25:19,p50:24,p75:29,p90:35,hib:true},
    kPct:       {p10:14,p25:18,p50:22,p75:27,p90:32,hib:true},
    bbPct:      {p10:4,p25:6,p50:8,p75:11,p90:14,hib:false},
    avgXwoba:   {p10:.26,p25:.29,p50:.32,p75:.35,p90:.39,hib:false},
    avgEV:      {p10:85,p25:87,p50:89,p75:91,p90:93,hib:false},
    hardHitPct: {p10:28,p25:33,p50:38,p75:43,p90:49,hib:false},
    avgVelo:    {p10:90,p25:92,p50:94,p75:96,p90:98,hib:true},
  };

  function getPct(val, dist) {
    if (val===null||isNaN(val)) return null;
    const {p10,p25,p50,p75,p90,hib} = dist;
    let pct;
    if (val<=p10) pct=hib?5:95;
    else if (val<=p25) pct=hib?15+(val-p10)/(p25-p10)*15:80-(val-p10)/(p25-p10)*15;
    else if (val<=p50) pct=hib?30+(val-p25)/(p50-p25)*20:65-(val-p25)/(p50-p25)*20;
    else if (val<=p75) pct=hib?50+(val-p50)/(p75-p50)*25:40-(val-p50)/(p75-p50)*25;
    else if (val<=p90) pct=hib?75+(val-p75)/(p90-p75)*15:15-(val-p75)/(p90-p75)*10;
    else pct=hib?92:5;
    return Math.min(99,Math.max(1,Math.round(pct)));
  }

  function pctColor(p) {
    if (p===null) return '#555';
    if (p>=80) return '#e91e8c';
    if (p>=60) return '#e91e8c99';
    if (p>=40) return '#72747c';
    if (p>=20) return '#534AB7';
    return '#378ADD';
  }

  function bar(label, val, display, dist, unit='') {
    if (isIndy) return `<div class="pct-row"><div class="pct-label">${label}</div><div class="pct-bar-track"><div class="pct-bar-fill" style="width:50%;background:var(--cyan)"></div></div><div class="pct-value">${display!==null?display+unit:'—'}</div></div>`;
    const p = getPct(val, dist);
    const color = pctColor(p);
    return `<div class="pct-row">
      <div class="pct-label">${label}</div>
      <div class="pct-bar-track">
        <div class="pct-bar-fill" style="width:${p||0}%;background:${color}">
          ${p!==null?`<span class="pct-bubble" style="background:${color}">${p}</span>`:''}
        </div>
      </div>
      <div class="pct-value">${display!==null?display+unit:'—'}</div>
    </div>`;
  }

  const r = (v,d=1) => v!==null&&v!==undefined?+v.toFixed(d):null;

  document.getElementById('report-content').innerHTML = `
    <div class="report-header">
      <div class="report-name">${athlete.name}</div>
      <div class="report-meta">${athlete.throws||''}HP · ${athlete.team||''} · ${athlete.level||''} · 2026 Season</div>
      <div class="report-sum-strip">
        ${[{v:outings.length,l:'G'},{v:totalP,l:'Pitches'},{v:totalK,l:'K'},{v:totalBB,l:'BB'},{v:avgVelo?avgVelo.toFixed(1):'—',l:'FB avg'},{v:peakVelo?peakVelo.toFixed(1):'—',l:'FB peak'}]
          .map(k=>`<div class="report-sum-stat"><div class="report-sum-val">${k.v}</div><div class="report-sum-lbl">${k.l}</div></div>`).join('')}
      </div>
    </div>
    <div class="report-body">
      <div class="pct-section-hd">Season Percentiles${isIndy?' (raw values)':' vs. MLB'}</div>
      <div class="pct-axis"><span>Poor</span><span>Average</span><span>Great</span></div>
      <div class="pct-group-hd">Results</div>
      ${avgXwoba!==null?bar('xwOBA',avgXwoba,r(avgXwoba,3),DIST.avgXwoba):''}
      ${bar('Whiff%',whiffPct,r(whiffPct),DIST.whiffPct,'%')}
      ${bar('CSW%',cswPct,r(cswPct),DIST.cswPct,'%')}
      ${bar('K%',kPct,r(kPct),DIST.kPct,'%')}
      ${bar('BB%',bbPct,r(bbPct),DIST.bbPct,'%')}
      <div class="pct-group-hd">Contact quality</div>
      ${avgEV!==null?bar('Avg EV',avgEV,r(avgEV),DIST.avgEV,' mph'):''}
      <div class="pct-group-hd">Stuff</div>
      ${avgVelo!==null?bar('FB Avg Velo',avgVelo,r(avgVelo),DIST.avgVelo,' mph'):''}
      ${peakVelo!==null?bar('FB Peak Velo',peakVelo,r(peakVelo),DIST.avgVelo,' mph'):''}
    </div>`;
}

async function renderSeasonInsight() {
  const container = document.getElementById('season-insight-content');
  if (!outings.length) { container.innerHTML = '<div class="empty-state">No outing data yet.</div>'; return; }

  const combined = {};
  outings.forEach(o => {
    let pm = {};
    try { pm = typeof o.pitch_stats==='object' ? o.pitch_stats : JSON.parse(o.pitch_stats_json||'{}'); } catch(e){}
    Object.entries(pm).forEach(([pt,s]) => {
      if (!s.count) return;
      if (!combined[pt]) combined[pt] = { count:0, whiffs:0, cstrikes:0, xwobas:[], velos:[], ivbs:[], hbs:[], vaas:[] };
      const c = combined[pt];
      c.count += s.count||0; c.whiffs += s.whiffs||0; c.cstrikes += s.cstrikes||0;
      if (s.avgVelo)  c.velos.push(pf(s.avgVelo));
      if (s.avgXwoba) c.xwobas.push(pf(s.avgXwoba));
      if (s.avgIVB)   c.ivbs.push(pf(s.avgIVB));
      if (s.avgHB)    c.hbs.push(pf(s.avgHB));
      if (s.avgVAA)   c.vaas.push(pf(s.avgVAA));
    });
  });

  const total = Object.values(combined).reduce((a,s)=>a+s.count, 0);
  const totalK  = outings.reduce((a,o)=>a+(+o.strikeouts||0),0);
  const totalBB = outings.reduce((a,o)=>a+(+o.walks||0),0);
  const sorted = Object.entries(combined).sort((a,b)=>b[1].count-a[1].count);

  const pitchLines = sorted.map(([pt,s]) => {
    const mlb = MLB_BASELINE_REF[pt];
    const whiff = s.count ? (s.whiffs/s.count*100).toFixed(1) : 0;
    const csw   = s.count ? ((s.whiffs+s.cstrikes)/s.count*100).toFixed(1) : 0;
    const xwoba = s.xwobas.length ? avg(s.xwobas).toFixed(3) : 'N/A';
    const velo  = s.velos.length ? avg(s.velos).toFixed(1) : '?';
    const ivb   = s.ivbs.length ? avg(s.ivbs).toFixed(1) : '?';
    const hb    = s.hbs.length ? avg(s.hbs).toFixed(1) : '?';
    return `${PITCH_NAMES[pt]||pt}: ${(s.count/total*100).toFixed(0)}% usage | ${velo}mph | Whiff:${whiff}% (MLB avg:${mlb?.whiff_pct||'?'}%) | CSW:${csw}% | xwOBA:${xwoba} | IVB:${ivb}" HB:${hb}"`;
  }).join('\n');

  const zonePct = avg(outings.map(o=>pf(o.zone_pct)).filter(Boolean));
  const oSwing  = avg(outings.map(o=>pf(o.o_swing_pct)).filter(Boolean));
  const gbPct   = avg(outings.map(o=>pf(o.gb_pct)).filter(Boolean));

  const prompt = `You are a pitching coach at 8ctane Baseball writing directly to your pitcher. Tone: direct, encouraging, specific. Use "you" and "your". Frame weaknesses as opportunities. Speak plainly. NEVER mention psStuff+ or any stuff grade.

PITCHER: ${athlete.name} (${athlete.throws}HP, ${athlete.team||''}, ${athlete.level||''})
SEASON: ${outings.length} outings, ${total} pitches, ${totalK}K, ${totalBB}BB
Zone%:${zonePct?zonePct.toFixed(1):'N/A'}% | O-Swing%:${oSwing?oSwing.toFixed(1):'N/A'}% | GB%:${gbPct?gbPct.toFixed(1):'N/A'}%

ARSENAL:
${pitchLines}

Respond JSON only:
{"headline":"2-3 words","summary":"3-4 sentences to pitcher","strengths":[{"title":"...","detail":"..."}],"concerns":[{"title":"...","detail":"..."}],"arsenalAssessment":{"keepPitches":[{"pitch":"...","reason":"..."}],"developPitches":[{"pitch":"...","reason":"..."}],"addPitch":{"pitch":"...","reason":"..."},"removePitch":{"pitch":"...","reason":"..."}},"splitAdvice":{"vsRHH":"...","vsLHH":"..."},"developmentPriorities":["...","...","..."]}`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=analyze`, {
      method:'POST', body: JSON.stringify({ action:'analyze', messages:[{ role:'user', content:prompt }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const raw = data.text || '';
    const match = raw.match(/\{[\s\S]*\}/);
    const a = JSON.parse(match ? match[0] : raw);

    const strengthCards = (a.strengths||[]).map(s=>`<div class="insight-card good"><div class="insight-title">${s.title}</div><div class="insight-body">${s.detail}</div></div>`).join('');
    const concernCards  = (a.concerns||[]).map(s=>`<div class="insight-card danger"><div class="insight-title">${s.title}</div><div class="insight-body">${s.detail}</div></div>`).join('');
    const keepPitches   = (a.arsenalAssessment?.keepPitches||[]).map(p=>`<div class="arsenal-rec keep">✓ <strong>${p.pitch}</strong> — ${p.reason}</div>`).join('');
    const devPitches    = (a.arsenalAssessment?.developPitches||[]).map(p=>`<div class="arsenal-rec develop">↑ <strong>${p.pitch}</strong> — ${p.reason}</div>`).join('');
    const addPitch      = a.arsenalAssessment?.addPitch ? `<div class="arsenal-rec add">+ Add: <strong>${a.arsenalAssessment.addPitch.pitch}</strong> — ${a.arsenalAssessment.addPitch.reason}</div>` : '';
    const removePitch   = a.arsenalAssessment?.removePitch ? `<div class="arsenal-rec remove">− <strong>${a.arsenalAssessment.removePitch.pitch}</strong> — ${a.arsenalAssessment.removePitch.reason}</div>` : '';

    container.innerHTML = `
      <div class="insight-headline">${a.headline||''}</div>
      <div class="insight-summary">${a.summary||''}</div>
      <div class="section-hd">Strengths &amp; concerns</div>
      <div class="insight-grid">${strengthCards}${concernCards}</div>
      <div class="section-hd">Arsenal</div>
      <div class="arsenal-recs">${keepPitches}${devPitches}${addPitch}${removePitch}</div>
      <div class="section-hd">Splits</div>
      <div class="splits-grid">
        <div class="splits-card"><div class="splits-hd" style="color:#378ADD">vs. Right-handed</div><div class="splits-body">${a.splitAdvice?.vsRHH||''}</div></div>
        <div class="splits-card"><div class="splits-hd" style="color:#D85A30">vs. Left-handed</div><div class="splits-body">${a.splitAdvice?.vsLHH||''}</div></div>
      </div>
      <div class="section-hd">Focus areas</div>
      <div class="dev-priorities">${(a.developmentPriorities||[]).map((p,i)=>`<div class="dev-row"><span class="dev-num">${i+1}</span><span>${p}</span></div>`).join('')}</div>`;
  } catch(e) {
    container.innerHTML = `<div class="empty-state">Could not generate insights: ${e.message}</div>`;
  }
}

async function loadOutingInsight() {
  const outingId = document.getElementById('outing-sel').value;
  if (!outingId) return;
  const outing = outings.find(o=>o.id===outingId);
  if (!outing) return;

  const container = document.getElementById('outing-insight-content');
  container.innerHTML = '<div class="ai-loading"><div class="loading-spinner"></div>Analyzing outing...</div>';

  let pm = {};
  try { pm = typeof outing.pitch_stats==='object' ? outing.pitch_stats : JSON.parse(outing.pitch_stats_json||'{}'); } catch(e){}

  const total = outing.total_pitches||0;
  const pitchLines = Object.entries(pm).filter(([,s])=>s.count>0).sort((a,b)=>b[1].count-a[1].count)
    .map(([pt,s]) => {
      const mlb = MLB_BASELINE_REF[pt];
      return `${PITCH_NAMES[pt]||pt}: ${s.count}p (${total?(s.count/total*100).toFixed(0):0}%) | ${s.avgVelo||'?'}mph | Whiff:${s.whiffPct||0}% (MLB:${mlb?.whiff_pct||'?'}%) | CSW:${s.cswPct||0}%`;
    }).join('\n');

  const prompt = `You are a pitching coach at 8ctane Baseball writing directly to your pitcher after their outing. Direct, honest, encouraging. Use "you"/"your". Plain language. NEVER mention psStuff+ or any stuff grade.

PITCHER: ${athlete.name} (${athlete.throws}HP)
OUTING: ${formatDate(outing.date)} vs ${outing.opponent||'Unknown'} | ${total}p | ${outing.ks||0}K ${outing.walks||0}BB
Zone%:${outing.zone_pct||'N/A'}% | O-Swing%:${outing.o_swing_pct||'N/A'}% | SwStr%:${total?(+outing.whiffs/total*100).toFixed(1):'N/A'}%

${pitchLines}

Respond JSON only:
{"headline":"2-3 words","summary":"3-4 sentences","whatWorked":[{"title":"...","detail":"..."}],"whatDidnt":[{"title":"...","detail":"..."}],"keyMoments":["..."],"nextOutingFocus":["...","...","..."]}`;

  try {
    const res = await fetch(`${SCRIPT_URL}?action=analyze`, {
      method:'POST', body: JSON.stringify({ action:'analyze', messages:[{ role:'user', content:prompt }] })
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    const raw = data.text||'';
    const match = raw.match(/\{[\s\S]*\}/);
    const a = JSON.parse(match ? match[0] : raw);

    const workedCards = (a.whatWorked||[]).map(s=>`<div class="insight-card good"><div class="insight-title">${s.title}</div><div class="insight-body">${s.detail}</div></div>`).join('');
    const didntCards  = (a.whatDidnt||[]).map(s=>`<div class="insight-card danger"><div class="insight-title">${s.title}</div><div class="insight-body">${s.detail}</div></div>`).join('');
    const pitchRows   = Object.entries(pm).filter(([,s])=>s.count>0).sort((a,b)=>b[1].count-a[1].count)
      .map(([pt,s])=>`<div style="display:flex;align-items:center;gap:10px;padding:.5rem 0;border-bottom:1px solid var(--border)">
        <span style="display:flex;align-items:center;gap:7px;min-width:90px"><span style="width:8px;height:8px;border-radius:50%;background:${pc(pt)};flex-shrink:0"></span><span style="font-family:'Barlow Condensed',sans-serif;font-weight:700">${pn(pt)}</span></span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;min-width:30px">${s.count}</span>
        <span style="color:var(--muted);font-size:11px;min-width:40px">${total?(s.count/total*100).toFixed(0):0}%</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;min-width:55px">${s.avgVelo||'—'} mph</span>
        <span style="font-family:'DM Mono',monospace;font-size:11px;color:${parseFloat(s.whiffPct)>=30?'var(--good)':''}">${s.whiffPct||0}% W</span>
      </div>`).join('');

    container.innerHTML = `
      <div class="insight-headline">${a.headline||''}</div>
      <div style="font-family:'DM Mono',monospace;font-size:11px;color:var(--cyan);margin-bottom:.5rem">${formatDate(outing.date)} · vs ${outing.opponent||'—'} · ${total} pitches · ${outing.ks||0}K ${outing.walks||0}BB</div>
      <div class="insight-summary">${a.summary||''}</div>
      <div class="section-hd">Pitch breakdown</div>
      <div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.75rem 1.25rem;margin-bottom:1.5rem">${pitchRows}</div>
      <div class="section-hd">What worked / what didn't</div>
      <div class="insight-grid">${workedCards}${didntCards}</div>
      ${a.keyMoments?.length?`<div class="section-hd" style="margin-top:1.5rem">Key moments</div><div style="background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:.875rem 1.25rem">${a.keyMoments.map(m=>`<div style="padding:.4rem 0;border-bottom:1px solid var(--border);font-size:13px;color:var(--muted)">· ${m}</div>`).join('')}</div>`:''}
      <div class="section-hd" style="margin-top:1.5rem">Focus for next outing</div>
      <div class="dev-priorities">${(a.nextOutingFocus||[]).map((p,i)=>`<div class="dev-row"><span class="dev-num">${i+1}</span><span>${p}</span></div>`).join('')}</div>`;
  } catch(e) {
    container.innerHTML = `<div class="empty-state">Could not generate insights: ${e.message}</div>`;
  }
}

// =============================================
// TABS
// =============================================
document.querySelectorAll('.ptab').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.ptab').forEach(b=>b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p=>p.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('tab-' + btn.dataset.tab).classList.add('active');
  });
});

init();
</script>

</body>
</html>
